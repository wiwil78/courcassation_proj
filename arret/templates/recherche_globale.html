{% extends "base.html" %}
{% block content %}
<div class="container my-4">

<h3>Recherche juridique</h3>

<form method="get" class="mb-3">
    <input type="text" name="q" class="form-control"
           placeholder="Mot-clé, article, titre..."
           value="{{ q }}">
</form>

{% for article in resultats %}
<div class="card mb-2">
    <div class="card-body">
        <strong>
            {{ article.chapitre.titre.texte.titre }}
        </strong><br>
        Article {{ article.numero }}<br>
        {{ article.contenu|truncatewords:30 }}
    </div>
</div>
{% empty %}
<p>Aucun résultat.</p>
{% endfor %}

</div>
{% endblock %}
